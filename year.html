<!DOCTYPE html>
<html>
    <head>
        <title>Coach Form</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <form action="show" method="get">
            <table border="0">
                <tr>
                    <td>Enter coach name:</td>
                    <td><input type="text" name="name" value="" /></td>
                </tr>
                <tr>
                    <td>Choose an position:</td>
                    <td>
                        <input type="radio" name="position" value="Goalkeeper" /> Goalkeeper
                        <input type="radio" name="position" value="Fitness" /> Fitness
                        <input type="radio" name="position" value="Head" /> Head
                    </td>
                </tr>
                <tr>
                    <td>Enter years of experience:</td>
                    <td><input type="text" name="years" value="" /></td>
                </tr>
                <tr>
                    <td><input type="submit" value="SHOW" /></td>
                    <td></td>
                </tr>
            </table>
        </form>
    </body>
</html>
